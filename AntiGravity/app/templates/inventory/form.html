{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">
        <a href="{{ url_for('inventory.list_motorcycles') }}" class="text-decoration-none text-muted me-2"><i class="bi bi-arrow-left"></i></a>
        {{ 'Editar Motocicleta' if motocicleta else 'Nueva Motocicleta' }}
    </h2>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('inventory.edit_motorcycle', id=motocicleta.id) if motocicleta else url_for('inventory.create_motorcycle') }}">
            
            <h5 class="mb-3 text-primary border-bottom pb-2">Datos del Vehículo</h5>
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="marca" class="form-label">Marca <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="marca" name="marca" value="{{ motocicleta.marca if motocicleta else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label for="modelo" class="form-label">Modelo <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="modelo" name="modelo" value="{{ motocicleta.modelo if motocicleta else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label for="año" class="form-label">Año</label>
                    <input type="number" min="1900" max="2100" class="form-control" id="año" name="año" value="{{ motocicleta.año if motocicleta else '' }}">
                </div>
                
                <div class="col-md-6">
                    <label for="vin" class="form-label">Número VIN (Chasis) <span class="text-danger">*</span></label>
                    <input type="text" class="form-control text-uppercase" id="vin" name="vin" value="{{ motocicleta.vin if motocicleta else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label for="color" class="form-label">Color</label>
                    <input type="text" class="form-control" id="color" name="color" value="{{ motocicleta.color if motocicleta else '' }}">
                </div>
                <div class="col-md-3">
                    <label for="tipo_motor" class="form-label">Tipo de Motor (CCs)</label>
                    <input type="text" class="form-control" id="tipo_motor" name="tipo_motor" value="{{ motocicleta.tipo_motor if motocicleta else '' }}">
                </div>
            </div>
            
            <h5 class="mb-3 text-success border-bottom pb-2 mt-5">Datos Comerciales</h5>
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="costo" class="form-label">Precio de Compra $ <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" step="0.01" min="0" class="form-control" id="costo" name="costo" value="{{ motocicleta.producto.costo if motocicleta and motocicleta.producto else '' }}" required oninput="calcularPrecios()">
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="ganancia" class="form-label">Ganancia Deseada $ <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" step="0.01" min="0" class="form-control fw-bold text-success" id="ganancia" name="ganancia" value="{{ "%.2f"|format(motocicleta.producto.precio - motocicleta.producto.costo) if motocicleta and motocicleta.producto and motocicleta.producto.costo else '' }}" required oninput="calcularPrecios()">
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="itbis_porcentaje" class="form-label">ITBIS (%)</label>
                    <div class="input-group">
                        <input type="number" step="0.1" min="0" class="form-control" id="itbis_porcentaje" name="itbis_porcentaje" value="{{ "%.1f"|format(motocicleta.producto.itbis / motocicleta.producto.precio * 100) if motocicleta and motocicleta.producto and motocicleta.producto.precio > 0 else '18' }}" oninput="calcularPrecios()">
                        <span class="input-group-text">%</span>
                    </div>
                </div>
            </div>
            
            <div class="row g-3 mt-2 mb-4 p-3 bg-light rounded border border-2 border-primary border-opacity-25">
                <div class="col-md-4">
                    <label class="form-label text-muted fw-semibold mb-1">Precio Base Venta $</label>
                    <input type="text" class="form-control bg-white text-dark" id="precio_base_display" readonly value="0.00">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted fw-semibold mb-1">Monto ITBIS $</label>
                    <input type="text" class="form-control bg-white text-dark" id="monto_itbis_display" readonly value="0.00">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-primary fw-bold mb-1">Precio Final Venta $</label>
                    <input type="text" class="form-control bg-white text-primary border-primary fw-bold fs-5" id="precio_final_display" readonly value="0.00">
                </div>
            </div>
            
            <div class="row g-3 mt-1">
                <div class="col-md-4">
                    <label for="estado" class="form-label">Estado actual</label>
                    <select class="form-select" id="estado" name="estado">
                        <option value="en inventario" {{ 'selected' if motocicleta and motocicleta.estado == 'en inventario' else '' }}>En Inventario</option>
                        <option value="vendida" {{ 'selected' if motocicleta and motocicleta.estado == 'vendida' else '' }}>Vendida</option>
                        <option value="apartada" {{ 'selected' if motocicleta and motocicleta.estado == 'apartada' else '' }}>Apartada</option>
                        <option value="en reparacion" {{ 'selected' if motocicleta and motocicleta.estado == 'en reparacion' else '' }}>En Reparación</option>
                    </select>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4 pt-3 border-top">
                <a href="{{ url_for('inventory.list_motorcycles') }}" class="btn btn-light me-2">Cancelar</a>
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-save me-2"></i> {{ 'Actualizar Motocicleta' if motocicleta else 'Registrar Motocicleta' }}
                </button>
            </div>
</form>
    </div>
</div>

<script>
    function calcularPrecios() {
        const costoInput = document.getElementById('costo').value;
        const gananciaInput = document.getElementById('ganancia').value;
        const porcentajeInput = document.getElementById('itbis_porcentaje').value;
        
        const costo = parseFloat(costoInput) || 0;
        const ganancia = parseFloat(gananciaInput) || 0;
        const itbisPorcentaje = parseFloat(porcentajeInput) || 0;
        
        // 1. precio base de venta = precio de compra + ganancia deseada
        const precioBase = costo + ganancia;
        
        // 2. monto ITBIS = precio base de venta * (ITBIS / 100)
        const montoITBIS = precioBase * (itbisPorcentaje / 100);
        
        // 3. precio final de venta = precio base de venta + monto ITBIS
        const precioFinal = precioBase + montoITBIS;
        
        document.getElementById('precio_base_display').value = precioBase.toFixed(2);
        document.getElementById('monto_itbis_display').value = montoITBIS.toFixed(2);
        document.getElementById('precio_final_display').value = precioFinal.toFixed(2);
    }
    
    // Ejecutar al cargar la página para pre-poblar
    document.addEventListener('DOMContentLoaded', calcularPrecios);
</script>
{% endblock %}
