{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">
        <a href="{{ url_for('suppliers.list_suppliers') }}" class="text-decoration-none text-muted me-2"><i class="bi bi-arrow-left"></i></a>
        {{ 'Editar Proveedor' if proveedor else 'Nuevo Proveedor' }}
    </h2>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('suppliers.edit_supplier', id=proveedor.id) if proveedor else url_for('suppliers.create_supplier') }}">
            
            <h5 class="mb-3 text-primary border-bottom pb-2">Datos de la Empresa</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-7">
                    <label for="nombre" class="form-label">Nombre de la Empresa o Entidad <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nombre" name="nombre" value="{{ proveedor.nombre if proveedor else '' }}" required>
                </div>
                <div class="col-md-5">
                    <label for="rnc" class="form-label">RNC / Identificación Fiscal</label>
                    <input type="text" class="form-control" id="rnc" name="rnc" value="{{ proveedor.rnc if proveedor else '' }}">
                </div>
            </div>

            <h5 class="mb-3 text-success border-bottom pb-2">Información de Contacto</h5>
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="contacto" class="form-label">Persona de Contacto Principal</label>
                    <input type="text" class="form-control" id="contacto" name="contacto" value="{{ proveedor.contacto if proveedor else '' }}" placeholder="Ej. Carlos Rodríguez">
                </div>
                <div class="col-md-3">
                    <label for="telefono" class="form-label">Teléfono <span class="text-muted">(Opcional)</span></label>
                    <input type="text" class="form-control" id="telefono" name="telefono" value="{{ proveedor.telefono if proveedor else '' }}">
                </div>
                <div class="col-md-3">
                    <label for="estado" class="form-label">Estado en el Sistema</label>
                    <select class="form-select" id="estado" name="estado">
                        <option value="activo" {{ 'selected' if proveedor and proveedor.estado == 'activo' else '' }}>Activo</option>
                        <option value="inactivo" {{ 'selected' if proveedor and proveedor.estado == 'inactivo' else '' }}>Inactivo</option>
                    </select>
                </div>
                <div class="col-12">
                    <label for="direccion" class="form-label">Dirección Física</label>
                    <textarea class="form-control" id="direccion" name="direccion" rows="3">{{ proveedor.direccion if proveedor else '' }}</textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4 pt-3 border-top">
                <a href="{{ url_for('suppliers.list_suppliers') }}" class="btn btn-light me-2">Cancelar</a>
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-save me-2"></i> {{ 'Actualizar Proveedor' if proveedor else 'Guardar Proveedor' }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
