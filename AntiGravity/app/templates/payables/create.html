{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Registrar Pago al Proveedor</h2>
</div>
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
                <form action="{{ url_for('payables.create_payment') }}" method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Seleccionar Cuenta por Pagar</label>
                        <select class="form-select" name="cuenta_pagar_id" id="cuentaSelect" required onchange="updateMaxMonto()">
                            <option value="" disabled {% if not preselected %}selected{% endif %}>Buscando cuenta pendiente...</option>
                            {% for c in cuentas %}
                                <option value="{{ c.id }}" data-saldo="{{ c.saldo }}" {% if preselected == c.id %}selected{% endif %}>
                                    COMP-{{ "{:05d}".format(c.compra_id) }} | {{ c.proveedor.nombre }} | Deuda: ${{ "{:,.2f}".format(c.saldo) }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Monto del Abono ($)</label>
                        <!-- Added system validation min="0.01" max="" dynamic via JS -->
                        <input type="number" class="form-control" name="monto" id="montoInput" step="0.01" min="0.01" disabled required>
                        <div class="form-text text-muted" id="montoHelp">Seleccione una cuenta para confirmar el saldo disponible.</div>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2 mt-4 pt-2 border-top">
                        <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-wallet2 me-1"></i> Procesar Pago</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function updateMaxMonto() {
        const select = document.getElementById('cuentaSelect');
        const input = document.getElementById('montoInput');
        const help = document.getElementById('montoHelp');
        
        const selectedOpt = select.options[select.selectedIndex];
        
        if (selectedOpt && selectedOpt.value) {
            const saldoStr = selectedOpt.dataset.saldo;
            input.disabled = false;
            input.max = saldoStr;
            help.textContent = `Saldo máximo permitido a pagar: $${parseFloat(saldoStr).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        if (document.getElementById('cuentaSelect').value) {
            updateMaxMonto();
        }
    });
</script>
{% endblock %}
