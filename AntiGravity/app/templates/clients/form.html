{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">
        <a href="{{ url_for('clients.list_clients') }}" class="text-decoration-none text-muted me-2"><i class="bi bi-arrow-left"></i></a>
        {{ 'Editar Cliente' if cliente else 'Nuevo Cliente' }}
    </h2>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('clients.edit_client', id=cliente.id) if cliente else url_for('clients.create_client') }}">
            
            <h5 class="mb-3 text-primary border-bottom pb-2">Datos Principales</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <label for="tipo" class="form-label">Tipo de Cliente <span class="text-danger">*</span></label>
                    <select class="form-select" id="tipo" name="tipo" required>
                        <option value="fisico" {{ 'selected' if cliente and cliente.tipo == 'fisico' else '' }}>Físico</option>
                        <option value="juridico" {{ 'selected' if cliente and cliente.tipo == 'juridico' else '' }}>Jurídico</option>
                    </select>
                </div>
                <div class="col-md-5">
                    <label for="nombre" class="form-label">Nombre Completo / Razón Social <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nombre" name="nombre" value="{{ cliente.nombre if cliente else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label for="documento" class="form-label">Documento (Cédula/RNC) <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="documento" name="documento" value="{{ cliente.documento if cliente else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label for="telefono" class="form-label">Teléfono</label>
                    <input type="text" class="form-control" id="telefono" name="telefono" value="{{ cliente.telefono if cliente else '' }}">
                </div>
                <div class="col-md-8">
                    <label for="direccion" class="form-label">Dirección</label>
                    <input type="text" class="form-control" id="direccion" name="direccion" value="{{ cliente.direccion if cliente else '' }}">
                </div>
            </div>

            <h5 class="mb-3 text-success border-bottom pb-2">Datos del Garante (Opcional)</h5>
            <p class="text-muted small mb-3">Información sobre la persona o entidad que sirve como garante crediticio.</p>
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="nombre_garante" class="form-label">Nombre del Garante</label>
                    <input type="text" class="form-control" id="nombre_garante" name="nombre_garante" value="{{ cliente.nombre_garante if cliente else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="documento_garante" class="form-label">Documento del Garante</label>
                    <input type="text" class="form-control" id="documento_garante" name="documento_garante" value="{{ cliente.documento_garante if cliente else '' }}">
                </div>
                <div class="col-md-4">
                    <label for="telefono_garante" class="form-label">Teléfono Garante</label>
                    <input type="text" class="form-control" id="telefono_garante" name="telefono_garante" value="{{ cliente.telefono_garante if cliente else '' }}">
                </div>
                <div class="col-md-8">
                    <label for="direccion_garante" class="form-label">Dirección Garante</label>
                    <input type="text" class="form-control" id="direccion_garante" name="direccion_garante" value="{{ cliente.direccion_garante if cliente else '' }}">
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4 pt-3 border-top">
                <a href="{{ url_for('clients.list_clients') }}" class="btn btn-light me-2">Cancelar</a>
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-save me-2"></i> {{ 'Actualizar Cliente' if cliente else 'Guardar Cliente' }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
